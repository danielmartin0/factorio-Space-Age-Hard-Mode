Hard-Planetary-Logistics=Этот мод лишает возможности создавать все пакеты на Вулканусе. А также вынуждая переносить производство модулей 3-го уровня на конкретные планеты. Мод обязывает игрока выстраивать маршруты для доставки компонентов в нужную среду и возврата готовых модулей туда, где они необходимы.\n\n(Удачи всем кто делает легендарные модули! - Returner_org)