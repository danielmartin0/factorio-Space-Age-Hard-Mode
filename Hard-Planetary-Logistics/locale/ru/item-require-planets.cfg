[mod-name]
Hard-Planetary-Logistics=Hard Planetary Logistics
[mod-description]
Hard-Planetary-Logistics=Этот мод лишает возможности создавать все пакеты на Вулканусе. А также вынуждая переносить производство модулей 3-го уровня на конкретные планеты. Мод обязывает игрока выстраивать маршруты для доставки компонентов в нужную среду и возврата готовых модулей туда, где они необходимы.\n\n(Удачи всем кто делает легендарные модули! - Returner_org)
[mod-setting-name]
planetary-logistics-lab-only-nauvis=[item=lab]Разрешить размещение лабораторий только на [planet=nauvis]Наувисе
planetary-logistics-automation-only-nauvis=[item=automation-science-pack]Разрешить сборку автоматизационного научного пакета только на [planet=nauvis]Наувисе
planetary-logistics-logistic-only-nauvis=[item=logistic-science-pack]Разрешить сборку логистического научного пакета только на [planet=nauvis]Наувисе
planetary-logistics-military-only-nauvis=[item=military-science-pack]Разрешить сборку военного научного пакета только на [planet=nauvis]Наувисе
planetary-logistics-chemical-only-nauvis=[item=chemical-science-pack]Разрешить сборку химического научного пакета только на [planet=nauvis]Наувисе
planetary-logistics-production-only-nauvis=[item=production-science-pack]Разрешить сборку производственного научного пакета только на [planet=nauvis]Наувисе
planetary-logistics-utility-only-nauvis=[item=utility-science-pack]Разрешить сборку вспомогательнного научного пакета только на [planet=nauvis]Наувисе
planetary-logistics-module-2-only-platform=[item=quality-module-2]Разрешить сборку модулей 2-го уровня только на [space-age]Фкосмических платформах
planetary-logistics-module-3-specific-planet=[item=quality-module-3]Разрешить сборку модулей 3-го уровня только на [space-location=solar-system-edge]соответствующих планетах

[mod-setting-description]
planetary-logistics-module-3-specific-planet=Производство модулей 3-го уровня доступно только на их конкретных планетах\nКачество - [planet=fulgora]Фульгора\nСкорость - [planet=vulcanus]Вулкан\nПродуктивность - [planet=gleba]Глеба\nЭффективность - [planet=nauvis]Наувис