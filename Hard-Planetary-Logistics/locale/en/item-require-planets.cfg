[mod-name]
Hard-Planetary-Logistics=Hard Planetary Logistics

[mod-description]
Hard-Planetary-Logistics=This mod removes the possibility of creating all science packs on Vulcanus and forces the relocation of Tier 3 module production to specific planets. It obliges the player to establish complex logistics routes to deliver components to the required environments and return finished modules to where they are needed.\n\n(Good luck to everyone crafting Legendary modules! — Returner_org)

[mod-setting-name]
planetary-logistics-lab-only-nauvis=[item=lab]Allow lab placement only on [planet=nauvis]Nauvis
planetary-logistics-automation-only-nauvis=[item=automation-science-pack]Allow automation science pack assembly only on [planet=nauvis]Nauvis
planetary-logistics-logistic-only-nauvis=[item=logistic-science-pack]Allow logistic science pack assembly only on [planet=nauvis]Nauvis
planetary-logistics-military-only-nauvis=[item=military-science-pack]Allow military science pack assembly only on [planet=nauvis]Nauvis
planetary-logistics-chemical-only-nauvis=[item=chemical-science-pack]Allow chemical science pack assembly only on [planet=nauvis]Nauvis
planetary-logistics-production-only-nauvis=[item=production-science-pack]Allow production science pack assembly only on [planet=nauvis]Nauvis
planetary-logistics-utility-only-nauvis=[item=utility-science-pack]Allow utility science pack assembly only on [planet=nauvis]Nauvis
planetary-logistics-module-2-only-platform=[item=quality-module-2]Allow level 2 module assembly only on [space-age]Space Platforms
planetary-logistics-module-3-specific-planet=[item=quality-module-3]Allow level 3 module assembly only on [space-location=solar-system-edge]specific planets

[mod-setting-description]
planetary-logistics-module-3-specific-planet=Production of level 3 modules is available only on their specific planets:\nQuality - [planet=fulgora]Fulgora\nSpeed - [planet=vulcanus]Vulcanus\nProductivity - [planet=gleba]Gleba\nEfficiency - [planet=nauvis]Nauvis